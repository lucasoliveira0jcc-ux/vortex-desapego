<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Você está offline — Vortex Desapego</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(160deg, #0f172a, #14532d); color: #e2e8f0; text-align: center; padding: 24px;
    }
    .card { max-width: 380px; }
    .leaf { width: 84px; height: 84px; margin: 0 auto 20px; }
    h1 { font-size: 1.4rem; margin: 0 0 8px; }
    p { color: #94a3b8; line-height: 1.5; }
    button {
      margin-top: 20px; background: #16a34a; color: #fff; border: 0; padding: 12px 22px;
      border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="leaf" src="icons/icon-192.png" alt="Vortex Desapego" />
    <h1>Você está offline</h1>
    <p>Não foi possível conectar à internet agora. Os anúncios que você já visualizou continuam disponíveis — reconecte para ver as novidades.</p>
    <button onclick="location.href='./'">Tentar novamente</button>
  </div>
</body>
</html>
